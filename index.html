<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday, My Love</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --beige:#f5efe6; --beige2:#ede0cf; --beige3:#d9c9b4;
  --purple:#9b72aa; --purple2:#7a5490;
  --purple-pale:#e8d9f0; --rose:#d4a0a8;
  --text-dark:#3d2a3a; --text-mid:#6b4a60; --text-soft:#9c7a8a;
}
html,body { width:100%; min-height:100vh; background:var(--beige); font-family:'Jost',sans-serif; overflow-x:hidden; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 55% 38% at 8% 12%,rgba(155,114,170,.09) 0%,transparent 70%),
    radial-gradient(ellipse 45% 32% at 92% 82%,rgba(212,160,168,.12) 0%,transparent 70%),
    radial-gradient(ellipse 38% 48% at 50% 50%,rgba(232,217,240,.14) 0%,transparent 80%);
  z-index:0;
}

/* PETALS */
.petal-layer { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
.petal { position:absolute; opacity:0; animation:petalFall linear infinite; }
@keyframes petalFall {
  0%   { transform:translateY(-60px) rotate(0deg) scale(.8);   opacity:0; }
  8%   { opacity:.65; }
  90%  { opacity:.35; }
  100% { transform:translateY(110vh) rotate(540deg) scale(1.1); opacity:0; }
}

/* ENVELOPE SCENE */
#envelopeScene {
  position:relative; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh; padding:32px 20px;
}
.env-wrapper {
  position:relative; width:min(420px,92vw);
  cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent;
}
.env-body {
  width:100%;
  background:linear-gradient(160deg,#f9f3ec 0%,#ede0cf 100%);
  border:1.5px solid var(--beige3);
  border-radius:4px 4px 10px 10px;
  box-shadow:0 20px 60px rgba(92,58,112,.13),0 4px 16px rgba(92,58,112,.08);
  position:relative; overflow:visible; padding-bottom:52%;
}
.env-body::before,.env-body::after { content:''; position:absolute; bottom:0; width:52%; height:100%; pointer-events:none; }
.env-body::before { left:0; background:linear-gradient(135deg,rgba(155,114,170,.07) 0%,transparent 60%); clip-path:polygon(0 100%,100% 100%,0 0); }
.env-body::after  { right:0; background:linear-gradient(225deg,rgba(155,114,170,.07) 0%,transparent 60%); clip-path:polygon(0 100%,100% 100%,100% 0); }
.env-fold-line { position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:1px; height:52%; background:linear-gradient(to top,var(--beige3),transparent); pointer-events:none; }
.env-flap-wrap { position:absolute; top:0; left:-1.5px; right:-1.5px; height:52%; perspective:800px; transform-style:preserve-3d; z-index:20; pointer-events:none; }
.env-flap { width:100%; height:100%; transform-origin:top center; transform:rotateX(0deg); transition:transform .9s cubic-bezier(.4,0,.2,1); position:relative; }
.env-flap-face {
  position:absolute; inset:0;
  background:linear-gradient(175deg,#ede0cf 0%,#e2d0b8 60%,#d9c4a8 100%);
  border:1.5px solid var(--beige3); border-bottom:none; border-radius:4px 4px 0 0;
  clip-path:polygon(0 0,100% 0,50% 100%);
}
.env-flap-face::after { content:''; position:absolute; inset:0; background:linear-gradient(to bottom,rgba(155,114,170,.08),transparent 60%); clip-path:polygon(0 0,100% 0,50% 100%); }
.env-flap-back { position:absolute; inset:0; background:linear-gradient(175deg,#f3e8f8 0%,#e8d9f0 100%); clip-path:polygon(0 0,100% 0,50% 100%); backface-visibility:hidden; transform:rotateX(180deg); }
.env-seal { position:absolute; top:42%; left:50%; transform:translate(-50%,-50%); z-index:30; width:64px; height:64px; transition:transform .5s ease,opacity .4s ease; }
.seal-circle { width:64px; height:64px; border-radius:50%; background:radial-gradient(circle at 38% 38%,#c49ab4,#9b72aa 55%,#7a5490); box-shadow:0 4px 18px rgba(122,84,144,.35),inset 0 1px 0 rgba(255,255,255,.18); display:flex; align-items:center; justify-content:center; font-size:26px; }
.env-hint { position:absolute; bottom:-38px; left:50%; transform:translateX(-50%); font-family:'Cormorant Garamond',serif; font-style:italic; font-size:14px; color:var(--text-soft); letter-spacing:.12em; white-space:nowrap; animation:hintPulse 2.2s ease-in-out infinite; transition:opacity .4s; }
@keyframes hintPulse { 0%,100%{opacity:.45} 50%{opacity:.9} }
.env-flap.open { transform:rotateX(-180deg); }
.env-seal.hide { transform:translate(-50%,-50%) scale(0); opacity:0; }
.env-card-rise { position:absolute; bottom:10%; left:50%; transform:translateX(-50%) translateY(30px); width:88%; opacity:0; transition:opacity .8s ease .5s,transform .9s cubic-bezier(.16,1,.3,1) .45s; pointer-events:none; z-index:5; }
.env-card-rise.risen { opacity:1; transform:translateX(-50%) translateY(-45%); pointer-events:auto; }
.card-peek { background:linear-gradient(160deg,#fdf6ec,#fff9f0); border-radius:10px; border:1px solid rgba(155,114,170,.2); box-shadow:0 8px 30px rgba(92,58,112,.15); padding:20px 16px 14px; text-align:center; }
.card-peek-title { font-family:'Great Vibes',cursive; font-size:26px; color:var(--purple2); margin-bottom:6px; }
.card-peek-sub   { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:12px; color:var(--text-soft); letter-spacing:.12em; }

/* CARD PAGE */
#cardPage { display:none; position:relative; z-index:10; }
.page { max-width:600px; margin:0 auto; padding:0 0 80px; }
.card-header { padding:64px 32px 40px; text-align:center; animation:fadeUp .9s ease both; }
.header-flowers { display:flex; justify-content:center; margin-bottom:24px; }
.header-flowers svg { width:340px; height:120px; }
.script-title { font-family:'Great Vibes',cursive; font-size:clamp(52px,12vw,72px); color:var(--purple2); line-height:1; margin-bottom:12px; }
.subtitle-date { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15px; color:var(--text-soft); letter-spacing:.18em; text-transform:uppercase; }
.thin-divider { display:flex; align-items:center; gap:16px; padding:0 40px; margin:24px 0; }
.thin-divider-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--beige3),transparent); }
.thin-divider-dot  { width:5px; height:5px; border-radius:50%; background:var(--purple); opacity:.4; }
.photos-section { padding:0 24px; margin-bottom:32px; animation:fadeUp .9s ease .15s both; }
.photo-hero { width:100%; border-radius:18px; overflow:hidden; box-shadow:0 12px 40px rgba(90,50,80,.12),0 0 0 1px rgba(155,114,170,.15); margin-bottom:12px; aspect-ratio:4/3; }
.photo-hero img { width:100%; height:100%; object-fit:cover; object-position:top center; display:block; }
.photo-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.photo-small { border-radius:14px; overflow:hidden; box-shadow:0 8px 24px rgba(90,50,80,.10),0 0 0 1px rgba(155,114,170,.12); aspect-ratio:3/4; }
.photo-small img { width:100%; height:100%; object-fit:cover; object-position:top center; display:block; }
.message-card { margin:0 24px 28px; background:rgba(255,255,255,.55); border:1px solid rgba(155,114,170,.18); border-radius:20px; padding:36px 32px; text-align:center; backdrop-filter:blur(8px); position:relative; overflow:hidden; animation:fadeUp .9s ease .3s both; }
.message-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--beige2),var(--purple-pale),#fae8ee,var(--purple-pale),var(--beige2)); }
.message-ornament { font-family:'Great Vibes',cursive; font-size:22px; color:var(--purple); opacity:.5; margin-bottom:16px; display:block; }
.message-main    { font-family:'Cormorant Garamond',serif; font-size:clamp(22px,5.5vw,30px); font-weight:300; color:var(--text-dark); line-height:1.55; margin-bottom:18px; }
.message-main em { font-style:italic; color:var(--purple2); }
.message-sub     { font-family:'Jost',sans-serif; font-size:13.5px; font-weight:300; color:var(--text-soft); letter-spacing:.06em; line-height:1.85; margin-bottom:20px; }
.message-from    { font-family:'Great Vibes',cursive; font-size:28px; color:var(--purple2); }
.footer-flowers  { display:flex; justify-content:center; margin:8px 0 16px; animation:fadeUp .9s ease .45s both; }
.footer-flowers svg { width:260px; height:80px; }
.footer-text { text-align:center; font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--text-soft); opacity:.55; padding-bottom:20px; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

#musicBtn { position:fixed; bottom:24px; right:20px; z-index:999; width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,.85); border:1px solid rgba(155,114,170,.3); backdrop-filter:blur(12px); cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(155,114,170,.2); transition:transform .25s,box-shadow .25s; }
#musicBtn:hover { transform:scale(1.08); box-shadow:0 6px 28px rgba(155,114,170,.3); }

@media(max-width:480px){
  .card-header{padding:48px 20px 32px}
  .photos-section{padding:0 16px}
  .message-card{margin:0 16px 24px;padding:28px 22px}
  .thin-divider{padding:0 24px}
}
</style>
</head>

<button id="musicBtn" onclick="toggleMusic()" title="Toggle music">🎵</button>

<script>
(function(){
  const colors=['#e8d9f0','#d4c0e4','#fae8ee','#f2d0da','rgba(200,184,154,.7)'];
  const layer=document.getElementById('petalLayer');
  for(let i=0;i<22;i++){
    const p=document.createElement('div');
    p.className='petal';
    const s=8+Math.random()*14;
    p.style.cssText=[
      `width:${s}px`,`height:${s*1.6}px`,
      `background:${colors[Math.floor(Math.random()*colors.length)]}`,
      `left:${Math.random()*100}vw`,
      `border-radius:${40+Math.random()*30}% 0 ${40+Math.random()*30}% 0`,
      `animation-duration:${9+Math.random()*10}s`,
      `animation-delay:${Math.random()*12}s`
    ].join(';');
    layer.appendChild(p);
  }
})();

let phase=0;
function openEnvelope(){
  if(phase===0){
    phase=1;
    document.getElementById('envFlap').classList.add('open');
    document.getElementById('envSeal').classList.add('hide');
    document.getElementById('envHint').style.opacity='0';
    setTimeout(()=>{ document.getElementById('cardRise').classList.add('risen'); phase=2; },750);
  } else if(phase===2){
    phase=3;
    const scene=document.getElementById('envelopeScene');
    scene.style.transition='opacity .6s ease';
    scene.style.opacity='0';
    setTimeout(()=>{ scene.style.display='none'; document.getElementById('cardPage').style.display='block'; window.scrollTo(0,0); },600);
  }
}

let playing=false;
function toggleMusic(){
  const a=document.getElementById('bgMusic');
  const b=document.getElementById('musicBtn');
  if(!playing){ a.volume=.25; a.play().catch(()=>{}); b.textContent='🎶'; playing=true; }
  else { a.pause(); b.textContent='🎵'; playing=false; }
}
</script>
